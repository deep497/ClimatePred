<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Predictor AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Climate<span class="highlight">Pred</span></h1>
            <p>Predict temperatures using Advanced Machine Learning</p>
        </header>

        <main class="card glass">
            <form id="predictionForm">
                <div class="input-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" name="year" placeholder="e.g. 2025" required min="1900" max="2100">
                </div>

                <div class="input-group">
                    <label for="month">Month</label>
                    <select id="month" name="month" required>
                        <option value="" disabled selected>Select Month</option>
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="district">District</label>
                    <select id="district" name="district" required>
                        <option value="" disabled selected>Select District</option>
                        <option value="shimla">Shimla</option>
                        <option value="kullu">Kullu</option>
                        <option value="kinnaur">Kinnaur</option>
                        <option value="kangra">Kangra</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="parameter">Parameter</label>
                    <select id="parameter" name="parameter" required>
                        <option value="maximum temperature">Maximum Temperature</option>
                        <option value="minimum temperature">Minimum Temperature</option>
                    </select>
                </div>

                <button type="submit" class="btn-neon">Predict Now</button>
            </form>

            <div id="result" class="result-container hidden">
                <h3>Predicted Temperature</h3>
                <div class="prediction-value">
                    <span id="tempValue">--</span><span class="unit">°C</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                year: document.getElementById('year').value,
                month: document.getElementById('month').value,
                district: document.getElementById('district').value,
                parameter: document.getElementById('parameter').value
            };

            const resultDiv = document.getElementById('result');
            const tempValue = document.getElementById('tempValue');
            const btn = document.querySelector('.btn-neon');

            // Loading state
            btn.innerHTML = 'Analyzing...';
            btn.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    tempValue.innerText = data.prediction;
                    resultDiv.classList.remove('hidden');
                    resultDiv.classList.add('fade-in');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred connecting to the server.');
            } finally {
                btn.innerHTML = 'Predict Now';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
